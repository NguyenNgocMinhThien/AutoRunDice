name: Dice Auto Apply

on:
  workflow_dispatch:
    inputs:
      jobs_json:
        description: 'JSON array of jobs to apply'
        required: true
        type: string
      spreadsheet_id:
        description: 'Google Spreadsheet ID'
        required: true
        type: string
      sheet_gid:
        description: 'Sheet GID'
        required: true
        type: string

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

        

      - name: Install Playwright System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 \
            libasound2t64 libatspi2.0-0 libxshmfence1
          npx playwright install --with-deps chromium

      - name: Run Apply Script
        env:
          DICE_EMAIL: ${{ secrets.DICE_EMAIL }}
          DICE_PASSWORD: ${{ secrets.DICE_PASSWORD }}
          RESUME_URL: ${{ secrets.RESUME_URL }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          JOBS_JSON: ${{ inputs.jobs_json }}
          SPREADSHEET_ID: ${{ inputs.spreadsheet_id }}
          SHEET_GID: ${{ inputs.sheet_gid }}
        run: node apply.js

      - name: Upload Apply Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Apply-Log
          path: apply_log.json
          retention-days: 7

      - name: Upload Apply Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Apply-Log
          path: apply_log.json
          retention-days: 7

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Apply-Screenshots
          path: /tmp/step_*.png
          retention-days: 3